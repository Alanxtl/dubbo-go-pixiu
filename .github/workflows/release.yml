name: Release
on:
  release:
    types: [created]

env:
  GO_VERSION: '1.25'
  BINARY_NAME: 'dubbo-go-pixiu'

jobs:
  release:
    name: Build and Release Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64, 386]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: windows
            goarch: arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and upload release assets
        uses: wangyoucao577/go-release-action@v1.41
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          project_path: "./cmd/pixiu"
          binary_name: ${{ env.BINARY_NAME }}
          asset_name: "${{ env.BINARY_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          extra_files: LICENSE README.md
          ldflags: "-s -w -X main.version=${{ env.RELEASE_VERSION }}"