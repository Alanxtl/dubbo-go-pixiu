name: Reviewdog

on:
  pull_request:
    types: [ opened, synchronize ]

jobs:
  review:
    name: Run golangci-lint with reviewdog
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run reviewdog
        uses: reviewdog/action-golangci-lint@v2 # NOSONAR
        with:
          golangci_lint_flags: "--timeout=10m"