name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

# cancel in-progress runs for the same branch or PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  license-check-and-import-format:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check License Header
        uses: apache/skywalking-eyes/header@main

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check Formatting
        run: |
          go install github.com/dubbogo/tools/cmd/imports-formatter@latest
          imports-formatter
          gofmt -l .
          git diff --exit-code

  golangci:
    needs: license-check-and-import-format
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0

  unit-test:
    needs: golangci
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Tests and Generate Coverage
        run: |
          if [ -f "before_ut.sh" ]; then
            chmod +x before_ut.sh && ./before_ut.sh
          fi

          go mod download
          go test ./... -gcflags=-l -race -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
          flags: unittests

  integration-test:
    needs: unit-test
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download Go Modules
        run: go mod download

      - name: Run Integration Tests
        run: |
          chmod +x start_integrate_test.sh
          ./start_integrate_test.sh ${{ github.repository }} ${{ github.sha }} ${{ github.base_ref }}