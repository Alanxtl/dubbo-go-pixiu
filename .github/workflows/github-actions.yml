name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  license-check:
    name: License Header Check - Go 1.25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check License Header
        uses: apache/skywalking-eyes/header@501a28d2fb4a9b962661987e50cf0219631b32ff

  format:
    name: Imports Formatter Check - Go 1.25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Install imports-formatter
        run: go install github.com/dubbogo/tools/cmd/imports-formatter@latest
      - name: Check formatting
        run: |
          go fmt ./...
          GOROOT=$(go env GOROOT) imports-formatter
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Code is not properly formatted. Please run 'go fmt ./...' and 'imports-formatter'."
            git diff
            exit 1
          else
            echo "Code formatting is correct."
          fi

  lint:
    name: Go Linter - Go 1.25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
          args: --timeout=30m --disable-all --enable=govet --enable=staticcheck --enable=ineffassign --enable=misspell

  unit-test:
    name: Unit Tests - Go 1.25
    runs-on: ubuntu-latest
    needs: [license-check, format, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Merge base branch
        if: github.event_name == 'pull_request'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin ${{ github.base_ref }}
          git merge origin/${{ github.base_ref }} --no-edit
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Install Dependencies
        run: go mod download
      - name: Run Unit Tests
        run: |
          chmod u+x before_ut.sh && ./before_ut.sh
          go test ./... -race -coverprofile=coverage.txt -covermode=atomic
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4 # NOSONAR
        with:
          fail_ci_if_error: true

  integration-test:
    name: Integration Tests - Go 1.25
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - name: Merge base branch
        if: github.event_name == 'pull_request'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin ${{ github.base_ref }}
          git merge origin/${{ github.base_ref }} --no-edit
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Install Dependencies
        run: go mod download
      - name: Run Integration Tests
        run: |
          chmod +x start_integrate_test.sh
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./start_integrate_test.sh ${{ github.event.pull_request.head.repo.full_name }} ${{ github.event.pull_request.head.sha }} ${{ github.base_ref }}
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            ./start_integrate_test.sh $GITHUB_REPOSITORY $GITHUB_SHA $GITHUB_REF_NAME
          fi