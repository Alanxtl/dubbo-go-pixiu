---
apiVersion: pixiu.apache.org/v1alpha1
kind: PixiuFilterPolicy
metadata:
  name: prometheus-filter-policy
  namespace: default
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: backend
  filterType: "dgp.filter.http.prometheusmetric"
  config:
    metric_collect_rules:
      metric_path: "/metrics"
      push_gateway_url: "http://127.0.0.1:9091"
      counter_push: true
      push_interval_threshold: 1
      push_job_name: "prometheus"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: default
spec:
  parentRefs:
    - name: pg
      namespace: pixiu-gateway-system
  hostnames:
    - "www.example.com"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: backend
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: pixiu.apache.org
            kind: PixiuFilterPolicy
            name: jwt-filter-policy
