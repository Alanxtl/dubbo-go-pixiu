apiVersion: pixiu.apache.org/v1alpha1
kind: PixiuFilterPolicy
metadata:
  name: ratelimit-filter-policy
  namespace: default
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: backend
  filterType: dgp.filter.http.ratelimit
  config:
    resources:
      - name: test-http
        items:
          - matchStrategy: 1
            pattern: "/v1/*"
    rules:
      - enable: true
        flowRule:
          resource: "test-http"
          threshold: 1
          statintervalinms: 1000
---
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: default
spec:
  parentRefs:
    - name: pg
      namespace: pixiu-gateway-system
  hostnames:
    - "www.example.com"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: backend
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: pixiu.apache.org
            kind: PixiuFilterPolicy
            name: ratelimit-filter-policy


