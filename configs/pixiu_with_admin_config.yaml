static_resources:
  listeners:
    - name: "net/http"
      protocol_type: "HTTP"
      address:
        socket_address:
          address: "0.0.0.0"
          port: 8888
      filter_chains:
        filters:
          - name: dgp.filter.httpconnectionmanager
            config:
              route_config:
                routes:
                  - match:
                      prefix: "/api/v1"
                    route:
                      cluster: "test-dubbo"
                      cluster_not_found_response_code: 505
              http_filters:
                - name: dgp.filter.http.apiconfig
                  config:
                    api_meta_config:
                      address: "pixiu_admin_etcd:2379"
                      api_config_path: "/pixiu/config/api"

              server_name: "test_http_dubbo"
              generate_request_id: false
      config:
        idle_timeout: 5s
        read_timeout: 5s
        write_timeout: 5s
  clusters:
    - name: "xds-server"
      type: "Static"
      endpoints:
        - socket_address:
            address: "pixiu_admin_go_backend"
            port: 18000
  shutdown_config:
    timeout: "60s"
    step_timeout: "10s"
    reject_policy: "immediacy"

api_meta_config:
  address: "pixiu_admin_etcd:2379"
  api_config_path: "/proxy/config/api"

dynamic_resources:
  lds_config: # config listener
    cluster_name: ["xds-server"]
    api_type: "GRPC"
    refresh_delay: "5s"
    request_timeout: "10s"
    grpc_services:
      - timeout: "5s"
  cds_config: # config cluster
    cluster_name: ["xds-server"]
    api_type: "GRPC"
    refresh_delay: "5s"
    request_timeout: "10s"
    grpc_services:
      - timeout: "5s"

node:
  id: "test-id"
  cluster: "pixiu"